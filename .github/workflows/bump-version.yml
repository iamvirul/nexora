name: Bump Version

# Triggered automatically by publish.yml after a successful release,
# or manually to prepare the next development cycle.
on:
  workflow_dispatch:
    inputs:
      released_tag:
        description: "The tag that was just released (e.g. v0.1.0)"
        required: true

jobs:
  bump:
    name: Bump all POMs to next SNAPSHOT and open PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # Use a PAT so the resulting PR can trigger CI workflows.
          # Fall back to GITHUB_TOKEN if PAT is not configured.
          token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Compute next SNAPSHOT version
        id: version
        run: |
          RELEASED="${{ inputs.released_tag }}"
          # Strip leading 'v'
          VERSION="${RELEASED#v}"
          # Split into major.minor.patch
          IFS='.' read -r MAJOR MINOR PATCH <<< "${VERSION%%-*}"
          # Bump minor, reset patch
          NEXT_MINOR=$((MINOR + 1))
          NEXT_VERSION="${MAJOR}.${NEXT_MINOR}.0-SNAPSHOT"
          echo "released=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "next=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "branch=chore/bump-version-${NEXT_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create version-bump branch
        run: |
          git checkout -b "${{ steps.version.outputs.branch }}"

      - name: Set next SNAPSHOT version in all POMs
        run: |
          NEXT_VER="${{ steps.version.outputs.next }}"
          mvn versions:set \
            -DnewVersion="$NEXT_VER" \
            -DgenerateBackupPoms=false \
            --no-transfer-progress
            
          # Update all internal module version properties to match
          for prop in $(grep '<nexora-.*\.version>' pom.xml | sed -E 's/.*<(nexora-[^>]+)>.*/\1/'); do
            mvn versions:set-property -Dproperty="$prop" -DnewVersion="$NEXT_VER" -DgenerateBackupPoms=false --no-transfer-progress
          done

      - name: Update CHANGELOG [Unreleased] link
        run: |
          NEXT="${{ steps.version.outputs.next }}"
          sed -i "s|^\[Unreleased\]:.*|\[Unreleased\]: https://github.com/${{ github.repository }}/compare/v${NEXT%%-*}...HEAD|" CHANGELOG.md || true

      - name: Commit version bump
        run: |
          git add -A
          git commit -m "chore: bump version to ${{ steps.version.outputs.next }} after ${{ inputs.released_tag }} release"

      - name: Push branch
        run: |
          git push origin "${{ steps.version.outputs.branch }}"

      - name: Open pull request
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `chore: bump version to ${{ steps.version.outputs.next }}`,
              head: '${{ steps.version.outputs.branch }}',
              base: 'main',
              body: [
                '## Post-release version bump',
                '',
                `This PR was opened automatically after the **${{ inputs.released_tag }}** release.`,
                '',
                '| | Version |',
                '|---|---|',
                `| Released | \`${{ steps.version.outputs.released }}\` |`,
                `| Next development | \`${{ steps.version.outputs.next }}\` |`,
                '',
                '### What changed',
                '- All `pom.xml` files updated to the next SNAPSHOT version via `mvn versions:set`',
                '',
                'Merge this PR to begin the next development cycle.',
              ].join('\n'),
            });
            core.info(`Opened PR #${pr.number}: ${pr.html_url}`);
