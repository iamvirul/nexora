name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.2.0)"
        required: true

jobs:
  publish:
    name: Publish modules to GitHub Packages
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      pull-requests: write

    outputs:
      tag: ${{ steps.tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: temurin
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      # Resolve tag from push event or manual input, then strip SNAPSHOT from pom
      - name: Resolve release tag and version
        id: tag
        run: |
          TAG="${GITHUB_REF_NAME:-}"
          if [ -z "$TAG" ] || [[ "$TAG" != v* ]]; then
            TAG="${{ inputs.tag }}"
          fi
          if [ -z "$TAG" ]; then
            echo "No tag provided." >&2
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Releasing ${TAG} (pom version -> ${VERSION})"

      - name: Set release version in pom
        env:
          NEW_VERSION: ${{ steps.tag.outputs.version }}
        run: |
          OLD_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          mvn versions:set -DnewVersion="${NEW_VERSION}" -DgenerateBackupPoms=false -q
          # versions:set updates <version> elements but not the individual nexora-*.version
          # properties in the parent pom — patch those explicitly
          sed -i "s|<nexora-\(.*\)\.version>[^<]*</nexora-\1\.version>|<nexora-\1.version>${NEW_VERSION}</nexora-\1.version>|g" pom.xml

      - name: Build & test all modules
        run: mvn install --no-transfer-progress
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Publish each module individually in dependency order ─────────────────
      - name: Publish root POM
        run: mvn deploy -N -DskipTests --no-transfer-progress
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish nexora-core
        run: mvn deploy -pl nexora-core -DskipTests --no-transfer-progress
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish nexora-plugin-spi
        run: mvn deploy -pl nexora-plugin-spi -DskipTests --no-transfer-progress
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish nexora-registry
        run: mvn deploy -pl nexora-registry -DskipTests --no-transfer-progress
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish nexora-tracing
        run: mvn deploy -pl nexora-tracing -DskipTests --no-transfer-progress
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish nexora-retry
        run: mvn deploy -pl nexora-retry -DskipTests --no-transfer-progress
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish nexora-event
        run: mvn deploy -pl nexora-event -DskipTests --no-transfer-progress
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish nexora-executor
        run: mvn deploy -pl nexora-executor -DskipTests --no-transfer-progress
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish nexora-plugin-loader
        run: mvn deploy -pl nexora-plugin-loader -DskipTests --no-transfer-progress
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish nexora-planner
        run: mvn deploy -pl nexora-planner -DskipTests --no-transfer-progress
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish nexora-capabilities
        run: mvn deploy -pl nexora-capabilities -DskipTests --no-transfer-progress
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish nexora-saga
        run: mvn deploy -pl nexora-saga -DskipTests --no-transfer-progress
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish nexora-persistence
        run: mvn deploy -pl nexora-persistence -DskipTests --no-transfer-progress
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish nexora-runtime
        run: mvn deploy -pl nexora-runtime -DskipTests --no-transfer-progress
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish nexora-api
        run: mvn deploy -pl nexora-api -DskipTests --no-transfer-progress
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish nexora-cli
        run: mvn deploy -pl nexora-cli -DskipTests --no-transfer-progress
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish nexora-all (shaded bundle)
        run: mvn deploy -pl nexora-all -DskipTests --no-transfer-progress
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── GitHub Release ───────────────────────────────────────────────────────
      - name: Extract release notes from CHANGELOG.md
        id: changelog
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          NOTES=$(awk "/^## \\[${VERSION}\\]/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md 2>/dev/null || true)
          if [ -z "$NOTES" ]; then
            NOTES=$(awk '/^## \[Unreleased\]/{found=1; next} found && /^## /{exit} found{print}' CHANGELOG.md 2>/dev/null || true)
          fi
          if [ -z "$NOTES" ]; then
            NOTES="Release ${{ steps.tag.outputs.tag }}"
          fi
          echo "$NOTES" > release-notes.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Nexora ${{ steps.tag.outputs.tag }}"
          body_path: release-notes.txt
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.tag, '-') }}
          files: |
            nexora-*/target/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Post-release: open version-bump PR ──────────────────────────────────────
  trigger-version-bump:
    name: Trigger next SNAPSHOT version bump PR
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      pull-requests: write
    steps:
      - name: Invoke bump-version workflow
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'bump-version.yml',
              ref: 'main',
              inputs: {
                released_tag: '${{ needs.publish.outputs.tag }}'
              }
            });
