<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nexora Process UI</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap');

    :root {
      --bg-1: #081222;
      --bg-2: #0f2f2b;
      --surface: rgba(8, 16, 30, 0.72);
      --surface-strong: rgba(6, 12, 24, 0.9);
      --border: rgba(120, 170, 200, 0.25);
      --text: #e8f1fb;
      --text-dim: #9db0c2;
      --ok: #34d399;
      --warn: #fbbf24;
      --bad: #f87171;
      --run: #38bdf8;
      --accent: #f97316;
      --mono: "IBM Plex Mono", "SFMono-Regular", Menlo, Consolas, monospace;
      --sans: "Space Grotesk", "Segoe UI", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: var(--sans);
      background:
              radial-gradient(1400px 700px at -10% -20%, rgba(56, 189, 248, 0.18), transparent 55%),
              radial-gradient(1200px 700px at 110% 0%, rgba(249, 115, 22, 0.20), transparent 55%),
              linear-gradient(150deg, var(--bg-1), var(--bg-2));
      padding: 22px;
    }

    .shell {
      max-width: 1320px;
      margin: 0 auto;
      display: grid;
      gap: 18px;
    }

    .hero {
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 22px;
      backdrop-filter: blur(10px);
      background: linear-gradient(145deg, var(--surface), rgba(8, 14, 26, 0.84));
      box-shadow: 0 22px 45px rgba(2, 6, 23, 0.35);
      animation: reveal 500ms ease-out;
    }

    .hero h1 {
      margin: 0 0 6px;
      font-size: clamp(24px, 3vw, 34px);
      letter-spacing: 0.2px;
    }

    .hero p {
      margin: 0;
      color: var(--text-dim);
    }

    .stats {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    }

    .stat {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 14px;
      background: var(--surface);
    }

    .stat .label {
      font-size: 12px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.7px;
    }

    .stat .value {
      margin-top: 8px;
      font-size: 24px;
      font-weight: 700;
      font-family: var(--mono);
    }

    .toolbar {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      background: var(--surface);
      display: grid;
      gap: 10px;
    }

    .toolbar h2 {
      margin: 0;
      font-size: 18px;
    }

    .toolbar .hint {
      margin: 0;
      color: var(--text-dim);
      font-size: 14px;
    }

    .form-grid {
      display: grid;
      gap: 10px;
      grid-template-columns: 1fr;
    }

    .row {
      display: grid;
      gap: 10px;
      grid-template-columns: 2fr 1fr auto;
      align-items: stretch;
    }

    @media (max-width: 860px) {
      .row { grid-template-columns: 1fr; }
    }

    input, textarea, button {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface-strong);
      color: var(--text);
      font: inherit;
    }

    input, textarea {
      padding: 10px 12px;
      outline: none;
    }

    textarea {
      min-height: 48px;
      resize: vertical;
      font-family: var(--mono);
      font-size: 13px;
    }

    input:focus, textarea:focus {
      border-color: rgba(56, 189, 248, 0.8);
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15);
    }

    button {
      padding: 0 18px;
      background: linear-gradient(135deg, #0ea5e9, #f97316);
      border: none;
      color: #04111f;
      font-weight: 700;
      min-height: 46px;
      cursor: pointer;
      transition: transform 130ms ease, filter 130ms ease;
      white-space: nowrap;
    }

    button:hover { transform: translateY(-1px); filter: brightness(1.05); }
    button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .flash {
      font-size: 13px;
      color: var(--text-dim);
      min-height: 18px;
    }

    .grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    }

    .exec {
      border: 1px solid var(--border);
      border-radius: 16px;
      background: linear-gradient(160deg, var(--surface), rgba(6, 10, 20, 0.85));
      padding: 14px;
      display: grid;
      gap: 10px;
      animation: reveal 320ms ease-out;
    }

    .exec-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .exec-id {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-dim);
    }

    .pill {
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.35px;
      text-transform: uppercase;
      border: 1px solid transparent;
    }

    .pill.running { color: #8ddfff; background: rgba(56, 189, 248, 0.16); border-color: rgba(56, 189, 248, 0.4); }
    .pill.completed { color: #9ef5d0; background: rgba(52, 211, 153, 0.14); border-color: rgba(52, 211, 153, 0.4); }
    .pill.failed { color: #ffc1c1; background: rgba(248, 113, 113, 0.13); border-color: rgba(248, 113, 113, 0.4); }
    .pill.skipped { color: #ffe7b0; background: rgba(251, 191, 36, 0.14); border-color: rgba(251, 191, 36, 0.4); }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .metric {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: rgba(7, 14, 24, 0.7);
      padding: 8px;
      text-align: center;
    }

    .metric .k { font-size: 10px; color: var(--text-dim); text-transform: uppercase; }
    .metric .v { font-size: 16px; font-family: var(--mono); margin-top: 4px; }

    .steps, .timeline {
      display: grid;
      gap: 6px;
      max-height: 190px;
      overflow: auto;
      padding-right: 4px;
    }

    .steps::-webkit-scrollbar,
    .timeline::-webkit-scrollbar {
      width: 6px;
    }

    .steps::-webkit-scrollbar-thumb,
    .timeline::-webkit-scrollbar-thumb {
      background: rgba(120, 170, 200, 0.35);
      border-radius: 99px;
    }

    .step, .event {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px;
      background: rgba(6, 12, 22, 0.72);
      font-size: 13px;
    }

    .step .top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }

    .mono {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-dim);
    }

    .muted {
      color: var(--text-dim);
      font-size: 12px;
    }

    .empty {
      border: 1px dashed var(--border);
      border-radius: 16px;
      padding: 28px;
      text-align: center;
      color: var(--text-dim);
    }

    @keyframes reveal {
      from { transform: translateY(8px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
  </style>
</head>
<body>
<main class="shell">
  <section class="hero">
    <h1>Nexora Process UI</h1>
    <p>Live execution tracking powered by Nexora events, with Prometheus metrics at <code>/metrics</code>.</p>
  </section>

  <section class="stats" id="stats"></section>

  <section class="toolbar">
    <h2>Run an Execution</h2>
    <p class="hint">Submit a goal and optional context JSON. The process timeline updates live below.</p>
    <form id="execute-form" class="form-grid">
      <div class="row">
        <input id="goal" type="text" placeholder='Goal (example: "process order payment notification")' required>
        <textarea id="context" placeholder='Context JSON (optional)'>{"orderId":"ORD-1001"}</textarea>
        <button id="run-btn" type="submit">Run</button>
      </div>
      <div id="flash" class="flash"></div>
    </form>
  </section>

  <section id="execution-grid" class="grid"></section>
</main>

<script>
  const statsEl = document.getElementById('stats');
  const execGridEl = document.getElementById('execution-grid');
  const form = document.getElementById('execute-form');
  const goalInput = document.getElementById('goal');
  const contextInput = document.getElementById('context');
  const runBtn = document.getElementById('run-btn');
  const flash = document.getElementById('flash');

  let latest = { generatedAtMs: Date.now(), activeExecutions: 0, executions: [] };

  function statusClass(status) {
    const s = (status || '').toLowerCase();
    if (s === 'running') return 'running';
    if (s === 'completed') return 'completed';
    if (s === 'failed') return 'failed';
    if (s === 'skipped') return 'skipped';
    return 'running';
  }

  function fmtTime(ts) {
    if (!ts) return '-';
    return new Date(ts).toLocaleTimeString();
  }

  function fmtDuration(ms) {
    if (!ms) return '0ms';
    if (ms >= 1000) return `${(ms / 1000).toFixed(2)}s`;
    return `${ms}ms`;
  }

  function setFlash(message, type = 'info') {
    flash.textContent = message;
    flash.style.color =
      type === 'error' ? '#fda4af' :
      type === 'ok' ? '#6ee7b7' :
      '#9db0c2';
  }

  function renderStats(data) {
    const total = data.executions.length;
    const completed = data.executions.filter(e => e.status === 'COMPLETED').length;
    const failed = data.executions.filter(e => e.status === 'FAILED').length;
    const running = data.executions.filter(e => e.status === 'RUNNING').length;

    const cards = [
      ['Active Executions', data.activeExecutions],
      ['Running in View', running],
      ['Completed in View', completed],
      ['Failed in View', failed],
      ['Tracked Executions', total],
      ['Last Refresh', fmtTime(data.generatedAtMs)]
    ];

    statsEl.innerHTML = cards.map(([label, value]) => `
      <article class="stat">
        <div class="label">${label}</div>
        <div class="value">${value}</div>
      </article>
    `).join('');
  }

  function renderExecutions(data) {
    if (!data.executions.length) {
      execGridEl.innerHTML = `
        <div class="empty">
          No executions yet. Submit one using the form above.
        </div>
      `;
      return;
    }

    execGridEl.innerHTML = data.executions.map(exec => {
      const durationMs = exec.finishedAtMs > 0 ? exec.finishedAtMs - exec.startedAtMs : Date.now() - exec.startedAtMs;
      const stepRows = exec.steps.map(step => `
        <div class="step">
          <div class="top">
            <strong>${step.stepId}</strong>
            <span class="pill ${statusClass(step.status)}">${step.status}</span>
          </div>
          <div class="mono">capability=${step.capabilityId}</div>
          <div class="muted">elapsed: ${fmtDuration(step.elapsedMs)}${step.failureCode ? ` • ${step.failureCode}` : ''}</div>
        </div>
      `).join('');

      const timelineRows = exec.timeline.slice().reverse().slice(0, 12).map(evt => `
        <div class="event">
          <div class="top">
            <span>${evt.type}</span>
            <span class="mono">${fmtTime(evt.occurredAtMs)}</span>
          </div>
          <div class="muted">${evt.message}</div>
        </div>
      `).join('');

      return `
        <article class="exec">
          <div class="exec-top">
            <div>
              <div><strong>${exec.status}</strong></div>
              <div class="exec-id">execution=${exec.executionId}</div>
            </div>
            <span class="pill ${statusClass(exec.status)}">${exec.status}</span>
          </div>
          <div class="metrics">
            <div class="metric"><div class="k">duration</div><div class="v">${fmtDuration(durationMs)}</div></div>
            <div class="metric"><div class="k">running</div><div class="v">${exec.runningSteps}</div></div>
            <div class="metric"><div class="k">completed</div><div class="v">${exec.completedSteps}</div></div>
            <div class="metric"><div class="k">failed/skipped</div><div class="v">${exec.failedSteps + exec.skippedSteps}</div></div>
          </div>
          <div class="steps">${stepRows || '<div class="muted">No steps yet.</div>'}</div>
          <div class="timeline">${timelineRows || '<div class="muted">No timeline events yet.</div>'}</div>
        </article>
      `;
    }).join('');
  }

  async function refresh() {
    try {
      const response = await fetch('/api/process', { cache: 'no-store' });
      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }
      latest = await response.json();
      renderStats(latest);
      renderExecutions(latest);
    } catch (error) {
      setFlash(`Failed to fetch process data: ${error.message}`, 'error');
    }
  }

  form.addEventListener('submit', async (event) => {
    event.preventDefault();
    const goal = goalInput.value.trim();
    if (!goal) {
      setFlash('Goal is required.', 'error');
      return;
    }

    let context = {};
    const rawContext = contextInput.value.trim();
    if (rawContext) {
      try {
        context = JSON.parse(rawContext);
      } catch (e) {
        setFlash(`Context JSON is invalid: ${e.message}`, 'error');
        return;
      }
    }

    runBtn.disabled = true;
    setFlash('Submitting execution...', 'info');
    try {
      const response = await fetch('/api/execute', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ goal, context })
      });
      const payload = await response.json();
      if (!response.ok || !payload.accepted) {
        throw new Error(payload.error || `HTTP ${response.status}`);
      }
      setFlash(`Execution accepted for goal: "${goal}"`, 'ok');
      refresh();
    } catch (error) {
      setFlash(`Execution request failed: ${error.message}`, 'error');
    } finally {
      runBtn.disabled = false;
    }
  });

  refresh();
  setInterval(refresh, 1000);
</script>
</body>
</html>
